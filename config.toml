# epubocr configuration TEMPLATE — see epubOCR.md for the design rationale.
# Copy this to `config.local.toml` (gitignored) and set your real endpoints there;
# epubocr prefers config.local.toml when present. Point base_url at an IP literal,
# NOT localhost, if you front a service with a relay (IPv4-only; Python stalls ~5s on IPv6).

[endpoints.ollama]                                  # DEFAULT — swaps model per request
base_url = "http://127.0.0.1:11434/v1"
api_key  = "ollama"                                 # Ollama ignores the key but the SDK requires one

[endpoints.vllm]                                    # throughput option — one model per process
base_url = "http://127.0.0.1:11437/v1"
api_key  = "EMPTY"

[endpoints.gateway]                                 # LLMConfig arbiter — auto-loads models on first /v1 request
base_url = "http://127.0.0.1:11430/v1"
api_key  = "EMPTY"

# Route through the gateway: it auto-loads models on demand (no manual serve.sh swap)
# and arbitrates a single GPU (evict-wait then load). Use ollama/vllm directly to pin one.
[roles]
vlm_ocr        = "gateway"
text_cleanup   = "gateway"

# Per-endpoint model names differ (Ollama tags vs vLLM served names).
[models.ollama]
vlm_ocr        = "qwen2.5vl:7b"                      # escalate hard pages to qwen2.5vl:32b
vlm_ocr_hard   = "qwen2.5vl:32b"
text_cleanup   = "qwen3:32b"
text_xhtml     = "qwen2.5-coder:32b"

[models.vllm]
vlm_ocr        = "qwen2.5-vl-7b"                     # requires host-side: serve.sh vl7
text_cleanup   = "qwen3-32b"                         # requires host-side: serve.sh q3-32b
text_xhtml     = "qwen3-coder-30b"                   # currently loaded on the box

[models.gateway]                                    # gateway resolves Ollama tags (':') or vLLM served names ('-')
vlm_ocr        = "qwen2.5vl:7b"                      # auto-loads on request; escalate hard pages to 32b
vlm_ocr_hard   = "qwen2.5-vl-32b"
text_cleanup   = "qwen3:32b"
text_xhtml     = "qwen2.5-coder:32b"

# OCR engine default (laptop). One of: tesseract | surya | surya2 | paddle | vlm.
# surya2 (Surya 2, >=0.20) is the default on fidelity grounds (honest-empty on unreadable
#   pages, cleaner marginal pages) but is ~6-10x slower and NEEDS A BACKEND: set
#   surya2_backend + a llama-server binary (LLAMA_CPP_BINARY) or a vLLM endpoint.
# surya (Surya 0.17, the `--engine surya` fast path) is the local, self-contained,
#   no-backend option — much faster, per-line confidence. Switch the default here if you
#   want speed over the last few points of fidelity.
[ocr]
default_engine = "surya2"                            # Surya 2 served-VLM; needs a backend (see surya2_backend)
layout         = false                               # opt-in: extract headings/lists/tables/reading order (Surya layout)
surya2_backend = "llamacpp"                          # backend for the 'surya2' engine: llamacpp | vllm
surya2_max_tokens = 6144                             # full-page generation cap (runaway guard); real pages stay well under
# vllm backend: attach to an already-running OpenAI-compatible vLLM server (no local
# binary). Point at the IP literal, not localhost. The model name MUST equal that
# server's served name (Surya's attach path rejects a mismatch).
# surya2_inference_url = "http://127.0.0.1:11437/v1"   # set surya2_backend = "vllm" to use this
# surya2_model         = "surya-ocr-2"                  # the server's --served-model-name

# Fidelity verifier thresholds (§7). A cleaned page that drifts past these is held for QA.
[fidelity]
max_cer_vs_ocr        = 0.15                          # char edit ratio of cleaned-vs-OCR substance
max_insertion_ratio   = 0.05                          # new alphanumeric runs absent from OCR
max_net_length_delta  = 0.20                          # |len(clean)-len(ocr)| / len(ocr)

# Adaptive preprocessing — steps off by default; enabled when detected AND eval improves.
[preprocess]
autocontrast_cutoff = 1          # clip this % of histogram tails before stretching
contrast            = 1.6        # >1 lifts faded scans (applied when preprocessing is on)
deskew         = true
denoise        = false
crop_borders   = false
upscale_lowres = false
split_spreads  = false

[paths]
projects_root = "book_projects"                      # one book_project/ per input EPUB
